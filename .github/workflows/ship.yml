name: Ship

on:
  workflow_dispatch:

concurrency:
  group: ship-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ship:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Restore Next.js Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Pull Vercel environment
        run: bunx --bun vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build Vercel output
        run: |
          export GZ_OPT="-9"
          bunx --bun vercel build --prod --token="$VERCEL_TOKEN"
      - name: Archive Vercel output
        run: |
          export GZ_OPT="-9"
          tar -czf vercel-output.tgz .vercel/output
      - name: Prune npm production dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm prune --production
      - name: Upload Vercel output artifact
        uses: actions/upload-artifact@v4
        with:
          name: vercel-output-${{ github.sha }}
          path: vercel-output.tgz
          if-no-files-found: error
          retention-days: 7
      - name: Deploy prebuilt output
        run: bunx --bun vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
